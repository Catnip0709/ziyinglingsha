name: 自动部署微信小程序

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装微信小程序CI工具
        run: npm install -g miniprogram-ci

      - name: 上传微信小程序
        run: |
          miniprogram-ci upload \
            --pp ./miniprogram \
            --pkp <(echo "$WECHAT_PRIVATE_KEY") \
            --appid $WECHAT_APPID \
            --uv "${{ github.run_number }}.${{ github.run_attempt }}" \
            --rn "自动发布" \
            --enable-es6 true \
            --enable-minify true
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_PRIVATE_KEY: ${{ secrets.WECHAT_PRIVATE_KEY }}